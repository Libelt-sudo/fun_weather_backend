services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    command: redis-server --save 20 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  db:
    image: postgres:15
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: .
      dockerfile: src/registration_api/Dockerfile
    command: alembic upgrade head
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  registration_api:
    build:
      context: .
      dockerfile: src/registration_api/Dockerfile
    command: ["uvicorn", "src.registration_api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      PYTHONPATH: /app/src/registration_api:/app/src
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  celery_worker:
    build:
      context: .
      dockerfile: src/sms_service/Dockerfile
    command: ["celery", "-A", "src.sms_service.celery_app", "worker", "--loglevel=info"]
    environment:
      PYTHONPATH: /app/src/sms_service:app/src:app/src/shared
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  celery_beat:
    build:
      context: .
      dockerfile: src/sms_service/Dockerfile
    command: ["celery", "-A", "src.sms_service.celery_app", "beat", "--loglevel=info"]
    environment:
      PYTHONPATH: /app/src/sms_service:app/src:app/src/shared
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      celery_worker:
        condition: service_started